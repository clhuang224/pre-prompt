<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <title>PrePrompt</title>
        <link rel="stylesheet" href="./assets/style.css">
    </head>
    <body>
        <h2>PrePrompt</h2>
        <div>
            <label>原始文章</label>
            <textarea id="inputText" placeholder="請貼上文章"></textarea>
        </div>
        <div>
            <label>結果</label>
            <textarea id="outputText" readonly></textarea>
        </div>
        <div class="actions">
            <button id="addMapping" type="button">新增項目</button>
        </div>
        <div id="mappings"></div>
        <div class="actions">
            <button id="exportMappings" type="button">匯出詞組</button>
            <button id="importMappings" type="button">匯入詞組</button>
            <input id="importFile" type="file" accept="application/json" hidden>
        </div>
        <p id="statusMessage" class="status-message" aria-live="polite"></p>
        <script src="./assets/script.js"></script>
    </body>
</html>
