<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PrePrompt</title>
        <link rel="icon" type="image/png" href="./assets/favicon.png">
        <link rel="stylesheet" href="./assets/css/base.css">
        <link rel="stylesheet" href="./assets/css/layout.css">
        <link rel="stylesheet" href="./assets/css/components.css">
    </head>
    <body>
        <main class="app-shell">
            <header class="page-header">
                <div class="page-header__content">
                    <div>
                        <p id="pageHeaderIntro" class="page-header__intro">Local-first privacy workflow</p>
                        <h1>PrePrompt</h1>
                        <p id="pageHeaderDescription" class="page-header__description">在貼給 LLM 之前，先用自訂詞組規則替換敏感資訊。</p>
                    </div>
                    <div class="locale-select">
                        <label id="languageLabel" for="languageSelect">語言</label>
                        <select id="languageSelect" aria-label="Language"></select>
                    </div>
                </div>
            </header>

            <section class="card editor-grid">
                <div class="field">
                    <label id="inputLabel" for="inputText">原文</label>
                    <textarea id="inputText" placeholder="請貼上文章"></textarea>
                </div>
                <div class="field">
                    <label id="outputLabel" for="outputText">結果</label>
                    <textarea id="outputText" readonly title="點一下即可複製內容"></textarea>
                </div>
            </section>

            <section class="card mapping-card">
                <div class="mapping__header">
                    <div class="mapping__heading">
                        <div>
                            <p id="mappingLabel" class="section-label">Mappings</p>
                            <h2 id="mappingTitle">詞組管理</h2>
                        </div>
                        <div class="action-group action-group--toolbar">
                            <button id="exportMappings" class="button button--secondary" type="button">匯出詞組</button>
                            <button id="importMappings" class="button button--secondary" type="button">匯入詞組</button>
                            <input id="importFile" type="file" accept="application/json" hidden>
                        </div>
                    </div>
                    <input id="mappingSearch" class="mapping__search" type="search" placeholder="搜尋詞組">
                </div>

                <div id="mappings" class="mapping-list"></div>

                <div class="action-group action-group--footer">
                    <button id="addMapping" class="button button--primary" type="button">新增</button>
                </div>
            </section>
        </main>
        <p id="statusMessage" class="toast" aria-live="polite"></p>
        <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
        <script type="module" src="./assets/js/app.js"></script>
    </body>
</html>
